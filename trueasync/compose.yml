services:

  app:
    image: trueasync/php-true-async:latest-frankenphp
    working_dir: /app
    command: php artisan async:franken --host=0.0.0.0 --port=8080 --workers=12 --buffer=1
    ports:
      - "8083:8080"
    volumes:
      - .:/app
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      APP_URL: http://localhost:8083
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    command: postgres -c max_connections=500
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel"]
      interval: 3s
      timeout: 3s
      retries: 10
