services:

  app:
    image: trueasync/php-true-async:latest-frankenphp
    working_dir: /app
    command: php bin/console async:franken --host=0.0.0.0 --port=8080 --workers=15 --buffer=0
    ports:
      - "8085:8080"
    volumes:
      - .:/app
    environment:
      APP_ENV: prod
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: symfony
      DB_USER: symfony
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    command: postgres -c max_connections=500
    environment:
      POSTGRES_DB: symfony
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: secret
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symfony"]
      interval: 3s
      timeout: 3s
      retries: 10
